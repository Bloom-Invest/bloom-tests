name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        timeout-minutes: 60
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        timeout-minutes: 60
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          allowed_bots: 'claude,claude[bot]'
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}. This is the Bloom E2E test suite built with Playwright and the Stably AI testing SDK.

            Focus on:
            - Test reliability: will this test be flaky? Are timeouts appropriate?
            - Correct use of Stably SDK: aiAssert vs raw Playwright assertions, agent.act usage
            - Selector stability: CSS class selectors break on builds — flag any `.css-*` or brittle nth() selectors
            - Test independence: each test must be self-contained and not depend on prior test state
            - Missing cleanup: tests that create data (portfolios, watchlist items) need afterAll cleanup hooks
            - Hardcoded waitForTimeout: flag any fixed waits > 2s; replace with waitForLoadState or aiAssert with timeout
            - aiAssert timeouts: all aiAssert calls must have { timeout: 60000 } or rely on the global expect.timeout set in playwright.config.ts

            DO NOT flag:
            - Style, naming, or formatting preferences
            - Minor wording differences in aiAssert prompts
            - Tests that are intentionally simple (e.g. just checking a page loads)
            - Missing coverage for untested pages (separate concern)

            If the PR has no issues worth flagging, just say "LGTM" and one sentence of what you reviewed.

            When you do flag something, keep it to 1-2 sentences: state the problem and how to fix it and where it is.

            Use full 40-char git SHA when linking to code (e.g., https://github.com/${{ github.repository }}/blob/FULL_SHA/path/file.ts#L10-L15).

            IMPORTANT: You may ONLY auto-fix issues that are:
            - Hardcoded waitForTimeout calls (replace with smart waits)
            - Missing { timeout: 60000 } on aiAssert calls
            - Brittle CSS class selectors (replace with getByRole/getByText)
            - Missing try/catch on optional overlay dismissal

            DO NOT auto-fix issues that require:
            - Rewriting test logic or flow
            - Understanding what the app is supposed to do
            - Adding new test steps or assertions

            REVIEW SUBMISSION:
            After completing your review, submit a formal GitHub review using gh pr review:
            - If you found issues: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Summary of issues found"`
            - If LGTM: `gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - brief summary"`
            If gh pr review fails (e.g. permissions), fall back to posting a comment with `gh pr comment` instead.

          claude_args: |
            --model claude-sonnet-4-6
            --allowed-tools "Read,Glob,Grep,Bash(gh pr *),Bash(gh issue *),Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Bash(gh pr review *),Bash(git diff *),Bash(git log *),Bash(git show *),Edit,Write,Bash(git add *),Bash(git commit *),Bash(git push *),WebSearch,WebFetch"
